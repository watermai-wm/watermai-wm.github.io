<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>碧藍航線組牌模擬器</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>組牌模擬器</h1>
		<h2><a href="index.html">卡片查詢</a></h2>
		<h2><a href="topdeck.html">上位構築查詢</a></h2>
        <!-- 文字搜尋框 -->
		<div class="search-inputs">
			<input type="text" id="searchName" placeholder="輸入卡片名稱..." oninput="searchCards()">
			<input type="text" id="searchCode" placeholder="輸入卡片編號..." oninput="searchCards()">
			<input type="text" id="searchEffect" placeholder="輸入卡片效果..." oninput="searchCards()">
		</div>
        <!-- 多選式篩選條件 -->
		<div class="filters">
			<div class="filter-column">
				<div class="filter-group" id="filterColorGroup">
					<h3>顏色</h3>
				</div>
				<div class="filter-group" id="filterTypeGroup">
					<h3>種類</h3>
				</div>
				<div class="filter-group" id="filterCostGroup">
					<h3>費用</h3>
				</div>
				<div class="filter-group" id="filterPowerGroup">
					<h3>戰力</h3>
				</div>
				<div class="filter-group" id="filterFactionGroup">
					<h3>陣營</h3>
				</div>
			</div>
			<div class="filter-column">
				<div class="filter-group" id="filterShipTypeGroup">
					<h3>艦船類型</h3>
				</div>
				<div class="filter-group" id="filterRarityGroup">
					<h3>罕貴</h3>
				</div>
				<div class="filter-group" id="filterForceGroup">
					<h3>勢力</h3>
				</div>
				<div class="filter-group" id="filterSupportTypeGroup">
					<h3>支援範圍</h3>
				</div>
				<div class="filter-group" id="filterSupportValueGroup">
					<h3>支援值</h3>
				</div>
				<div class="filter-group" id="filterObtainGroup">
					<h3>獲取方法</h3>
					<select id="filterObtainSelect" onchange="searchCards()">
						<option value="">全部</option> <!-- 預設選項，顯示全部 -->
					</select>
				</div>
				<div class="filter-group" id="filterEffectGroup">
					<h3>技能關鍵字</h3>
					<select id="filterEffectSelect" onchange="searchCards()">
						<option value="">全部</option> <!-- 預設顯示所有卡片 -->
						<option value="【無】">不擁有技能</option> 
						<option value="強擊">【強擊】</option> 
						<option value="固守">【固守】</option> 
						<option value="【遠程】">【遠程】</option> 
						<option value="【速攻】">【速攻】</option>
						<option value="【潛水】">【潛水】</option>
						<option value="【改造】">【改造】</option>
						<option value="【登場時】">【登場時】</option> 
						<option value="【己方回合結束時】">【己方回合結束時】</option> 
						<option value="【己方回合中】">【己方回合中】</option> 
						<option value="【對方回合中】">【對方回合中】</option> 
						<option value="【每回合1次】">【每回合1次】</option>  
						<option value="【攻擊時】">【攻擊時】</option> 
						<option value="被攻擊時">【被攻擊時】</option> 
						<option value="【被擊破時】">【被擊破時】</option> 
						<option value="【轉為休息狀態時】">【轉為休息狀態時】</option> 
						<option value="【己方的主階段中】">【己方的主階段中】</option> 
						<option value="【主階段啟動】">【主階段啟動】</option> 
						<option value="【反制】">【反制】</option> 
						<option value="【追擊】">【追擊】</option> 
						<option value="【絕地反擊】">【絕地反擊】</option>
					</select>
				</div>
			</div>
		</div>

        <!-- 重置按鈕 -->
        <button onclick="resetFilters()">重置篩選條件</button>

        <!-- 顯示查詢結果 -->
        <div id="results"></div>

        <!-- 分頁控制 -->
        <div id="pagination">
            <button id="prevPage" onclick="changePage(-1)">上一頁</button>
            <span id="pageInfo"></span>
            <button id="nextPage" onclick="changePage(1)">下一頁</button>
        </div>
		<h2>構築表</h2>
		<button id="clearDeckButton">清空構築表</button>
		<button id="shareDeckButton">分享構築(匯出成圖片)</button>
		<button onclick="generateDeckText()">產生構築文字檔</button>


		<div id="deckCounter" style="
			background: rgba(0, 0, 0, 0.8);
			color: white;
			padding: 10px;
			border-radius: 5px;
			//z-index: 1000;
		">
			卡牌數量: 0/50
		</div>


		<div id="deck"></div>
		<div id="flagship"></div>
		
		
    </div>
	<!-- 牌組統計與模擬區塊 -->
		<div id="deckStatsContainer" style="background: rgba(0, 0, 0, 0.8); color: white; padding: 15px; border-radius: 5px; margin-top: 10px;">
			
			<div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #444; padding-bottom: 10px; margin-bottom: 15px;">
				<h3 style="margin: 0;">牌組統計</h3>
				<button id="simulateDrawBtn" onclick="simulateStartingHand()" style="padding: 8px 15px; cursor: pointer; background-color: #007BFF; color: white; border: none; border-radius: 4px; font-weight: bold;">
					起手抽 5 張模擬
				</button>
			</div>
			
			<div style="display: flex; justify-content: space-between; gap: 20px; flex-wrap: wrap;">
				<div id="manaCurveContainer" style="flex: 1; min-width: 300px;">
					<h4 style="margin-top: 0;">費用曲線</h4>
					<div style="position: relative; height: 250px; width: 100%;">
						<canvas id="manaCurveChart"></canvas>
					</div>
				</div>
				
				<div id="typeDistributionContainer" style="flex: 1; min-width: 300px;">
					<h4 style="margin-top: 0;">種類分布</h4>
					<div style="position: relative; height: 250px; width: 100%; display: flex; justify-content: center;">
						<canvas id="typeDistributionChart"></canvas>
					</div>
				</div>
			</div>

		</div>

		<!-- 抽牌結果的 Modal -->
		<div id="drawSimulationModal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.9); z-index: 1001; justify-content: center; align-items: center; flex-direction: column;">
			<h2 style="color: white; margin-bottom: 20px;">起手 5 張模擬結果</h2>
			<div id="drawnCardsContainer" style="display: flex; gap: 15px; justify-content: center; flex-wrap: wrap; max-width: 90%;">
				<!-- 抽出的卡牌將顯示在這裡 -->
			</div>
			<div style="margin-top: 20px; display: flex; gap: 10px;">
				<button onclick="simulateStartingHand()" style="padding: 10px; cursor: pointer;">重新抽取</button>
				<button onclick="closeDrawSimulationModal()" style="padding: 10px; cursor: pointer;">關閉</button>
			</div>
		</div>

<!-- 牌組統計與模擬區塊結束 -->
	<br />
		<button onclick="exportDeckCode()">匯出牌組代碼</button>
		<textarea id="deckCodeOutput" readonly style="width: 100%; height: 80px;"></textarea>
		<textarea id="deckCodeInput" placeholder="貼上牌組代碼" style="width: 100%; height: 80px;"></textarea>
		<button onclick="importDeckCode()">載入牌組代碼</button>
	

	<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="data.js"></script>
    <script src="deckbuild.js"></script>
	<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
	<script src="https://cdnjs.cloudflare.com/ajax/libs/lz-string/1.4.4/lz-string.min.js"></script>


</body>
</html>
